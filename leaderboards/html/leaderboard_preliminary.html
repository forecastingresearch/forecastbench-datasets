          if (name==="Peer") {
            col.title = 'Peer <i class="info circle icon" data-html="Peer score relative to the average Brier score on each question. Higher scores are better."></i>';
            col.render = function(d,t){ return t==='display'?parseFloat(d).toFixed(3):d; };
            col.orderSequence = ['desc','asc'];
          }
          if (name==="BSS") {
            col.title = 'BSS <i class="info circle icon" data-html="Brier Skill Score using the ForecastBench Naive Forecaster. Higher scores are better."></i>';
            col.render = function(d,t){ return t==='display'?parseFloat(d).toFixed(3):d; };
            col.orderSequence = ['desc','asc'];
          }
          return col;
        });
        $('#dataTable').DataTable({
          data: rawData,
          columns: columns,
          order: [[ cols.indexOf('Dataset'), 'desc' ]],
          responsive: true,
          paging: false,
          info: true,
          search: { regex:true, smart:true },
          initComplete: function() {
            $('.info.circle.icon').popup({ html: true} );
          }
        });
      });
  </script>
  </body>
</html>
